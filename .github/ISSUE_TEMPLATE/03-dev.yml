name: Intern uppgift 🔒
description: För interna utvecklingsuppgifter - Endast för utvecklare. Detta används för tekniska uppgifter och implementationer.
title: "[INTERNAL]: "
labels:
  - internal
  - ai-issue-review
body:
  - type: markdown
    attributes:
      value: |
        **OBS! Detta är en mall för interna utvecklingsuppgifter och ska endast användas av utvecklare.**
        Använd andra mallar för att rapportera buggar eller föreslå nya funktioner om du inte är utvecklare.

  - type: textarea
    id: description
    attributes:
      label: Beskrivning av uppgiften/bug
      description: En tydlig och utförlig beskrivning av utvecklingsuppgiften.
      placeholder: |
        Beskriv vad som behöver utvecklas och varför. Inkludera teknisk kontext som är relevant.
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done (DoD)
      description: Kriterier som måste uppfyllas för att uppgiften ska anses vara klar.
      placeholder: |
        - Enhetstester är skrivna och godkända
        - Kodgranskning är genomförd
        - Dokumentation är uppdaterad
    validations:
      required: true
